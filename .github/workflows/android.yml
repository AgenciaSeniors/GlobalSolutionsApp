name: Compilar APK y AAB de Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 4. Instalar dependencias de npm
        run: npm install --legacy-peer-deps

      - name: 4.5. Preparar variables de entorno
        run: |
          cat << 'EOF' > .env.production
          ${{ secrets.ENV_FILE }}
          EOF

      - name: 5. Compilar el proyecto web (Next.js)
        run: npm run build

      - name: 6. Generar todo el entorno Android automáticamente
        run: |
          rm -rf android
          mkdir -p out
          echo "<html><body>App</body></html>" > out/index.html
          npx cap add android
          npx @capacitor/assets generate --android
          npx cap sync android

      - name: 7. Compilar APK de debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Preparar keystore para firma
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/globalsolutions.jks

      - name: 9. Compilar AAB firmado (para Play Store)
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/globalsolutions.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 10. Subir APK de debug
        uses: actions/upload-artifact@v4
        with:
          name: GlobalSolutions-APK-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: 11. Subir AAB firmado (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: GlobalSolutions-AAB-PlayStore
          path: android/app/build/outputs/bundle/release/app-release.aab
